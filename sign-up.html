<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up</title>

<style>
body{
    font-family:Arial;
    background:#1e293b;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    background:white;
    padding:40px;
    border-radius:15px;
    width:350px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
}

button{
    width:100%;
    padding:12px;
    background:#2563eb;
    color:white;
    border:none;
}

p{
    text-align:center;
}
</style>
</head>
<body>

<div class="card">

<h2>Create Account</h2>

<form id="signupForm">

<input
type="text"
placeholder="Full Name"
required>

<input
type="email"
placeholder="Email"
required>

<input
type="password"
placeholder="Password"
required>

<button type="submit">
Create Account
</button>

</form>

<p>
Already have an account?
<a href="login.html">
Login
</a>
</p>

</div>

<script>
document.getElementById("signupForm")
.addEventListener("submit",function(e){

e.preventDefault();

alert(
"Account created successfully."
);

window.location.href=
"login.html";
});
</script>

</body>
</html>
