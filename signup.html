<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduMaster Pro | Sign Up</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="animated-bg">
        <div class="gradient-bg"></div>
        <div class="particles"></div>
    </div>

    <main class="auth-page">
        <div class="auth-card">
            <div class="auth-brand">
                <div class="logo-icon">
                    <i class="fas fa-graduation-cap"></i>
                </div>
                <h1>Create Account</h1>
            </div>
            <p class="auth-subtitle">Join EduMaster Pro and start your learning journey today.</p>

            <form id="signupForm" class="auth-form">
                <label for="fullName">
                    <span>Full name</span>
                    <input type="text" id="fullName" placeholder="Your full name" required>
                </label>
                <label for="signupEmail">
                    <span>Email address</span>
                    <input type="email" id="signupEmail" placeholder="you@example.com" required>
                </label>
                <label for="signupPassword">
                    <span>Password</span>
                    <input type="password" id="signupPassword" placeholder="Create a strong password" required>
                </label>
                <label for="confirmPassword">
                    <span>Confirm password</span>
                    <input type="password" id="confirmPassword" placeholder="Re-enter password" required>
                </label>
                <button type="submit" class="btn-primary auth-submit">
                    <i class="fas fa-user-plus"></i> Sign Up
                </button>
            </form>

            <p id="signupMessage" class="auth-message"></p>

            <div class="auth-links">
                <a href="index.html">Already have an account? Login</a>
                <a href="courses.html">Browse courses</a>
            </div>
        </div>
    </main>

    <script src="common.js"></script>
    <script>
        const signupForm = document.getElementById('signupForm');
        const signupMessage = document.getElementById('signupMessage');
        const strongPasswordRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[^A-Za-z0-9]).{8,}$/;

        signupForm.addEventListener('submit', function (event) {
            event.preventDefault();

            const fullName = document.getElementById('fullName').value.trim();
            const email = document.getElementById('signupEmail').value.trim();
            const password = document.getElementById('signupPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (!fullName || !email || !password || !confirmPassword) {
                signupMessage.textContent = 'Please complete all fields.';
                signupMessage.className = 'auth-message error';
                return;
            }

            if (!strongPasswordRegex.test(password)) {
                signupMessage.textContent = 'Password must be at least 8 characters and include uppercase, lowercase, a number, and a special character.';
                signupMessage.className = 'auth-message error';
                return;
            }

            if (password !== confirmPassword) {
                signupMessage.textContent = 'Passwords do not match.';
                signupMessage.className = 'auth-message error';
                return;
            }

            const users = JSON.parse(localStorage.getItem('users') || '[]');
            const existingUser = users.find((user) => user.email.toLowerCase() === email.toLowerCase());

            if (existingUser) {
                signupMessage.textContent = 'An account with this email already exists.';
                signupMessage.className = 'auth-message error';
                return;
            }

            users.push({ fullName, email, password });
            localStorage.setItem('users', JSON.stringify(users));
            localStorage.setItem('isLoggedIn', 'true');
            localStorage.setItem('userEmail', email);
            localStorage.setItem('userName', fullName);

            signupMessage.textContent = 'Account created successfully! Redirecting...';
            signupMessage.className = 'auth-message success';

            setTimeout(() => {
                window.location.href = 'home.html';
            }, 800);
        });
    </script>
</body>
</html>
